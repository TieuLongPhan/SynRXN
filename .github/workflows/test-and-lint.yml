name: Test, lint, and package

on:
  push:
    branches: [dev, main, fps]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev]"

      - name: Lint
        run: ./lint.sh

      - name: Test
        run: pytest -q

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.11'
        run: python -m build

      - name: Inspect built distributions
        if: matrix.python-version == '3.11'
        run: python -m pip install twine && python -m twine check dist/*

      - name: Smoke-test installed wheel
        if: matrix.python-version == '3.11'
        run: |
          python -m venv /tmp/synrxn-smoke
          /tmp/synrxn-smoke/bin/python -m pip install dist/*.whl
          /tmp/synrxn-smoke/bin/python -c "import synrxn; print(synrxn.DataLoader)"
          /tmp/synrxn-smoke/bin/synrxn --help
