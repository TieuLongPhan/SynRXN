schema_version: "1.0"

# Shared meanings used by the catalog UI and validation tooling. Dataset-specific
# units are intentionally not inferred when the upstream datasets differ.
column_definitions:
  r_id: {role: identifier, description: Stable row identifier supplied by SynRXN.}
  original_id: {role: source_identifier, description: Identifier in the upstream dataset.}
  orig_index: {role: source_identifier, description: Row index in the upstream dataset.}
  rxn: {role: reaction, description: Reaction SMILES string.}
  reactions: {role: reaction, description: Reaction SMILES string retained under the upstream plural field name.}
  aam: {role: reaction, description: Atom-mapped reaction SMILES.}
  ground_truth: {role: reference, description: Curated reference reaction or atom mapping.}
  rxn_mapper: {role: prediction, description: Mapping predicted by RXNMapper.}
  graphormer: {role: prediction, description: Mapping predicted by Graphormer.}
  local_mapper: {role: prediction, description: Mapping predicted by LocalMapper.}
  rdt: {role: prediction, description: Mapping predicted by RDT.}
  label: {role: target, description: Reaction class or template label.}
  label_0: {role: target, description: Top-level hierarchical template label.}
  label_1: {role: target, description: Second-level hierarchical template label.}
  label_2: {role: target, description: Third-level hierarchical template label.}
  ec1: {role: target, description: First Enzyme Commission hierarchy level.}
  ec2: {role: target, description: Second Enzyme Commission hierarchy level.}
  ec3: {role: target, description: Third Enzyme Commission hierarchy level.}
  ea: {role: target, description: Activation-energy target; consult the upstream record for units.}
  dh: {role: target, description: Reaction-enthalpy target; consult the upstream record for units.}
  G_act: {role: target, description: Activation free-energy target; consult the upstream record for units.}
  G_r: {role: target, description: Reaction free-energy target; consult the upstream record for units.}
  lograte: {role: target, description: Logarithmic reaction-rate target.}
  Conversion: {role: target, description: Reaction conversion target.}
  onehot: {role: feature, description: Upstream one-hot encoded reaction context.}
  split: {role: partition, description: Published train, validation, or test assignment.}
  code: {role: source_identifier, description: Upstream reaction code.}
  reaction_original: {role: reaction, description: Original upstream reaction representation.}
  reaction: {role: reaction, description: Processed reaction representation.}
  rsmi: {role: reaction, description: Reaction SMILES representation.}
  reagent: {role: target, description: Reagent or catalyst target.}
  source: {role: provenance, description: Upstream source or subset marker.}
  rc: {role: target, description: Reaction-center annotation.}

datasets:
  aam/ecoli.csv.gz:
    title: E. coli atom mapping
    description: Biochemical atom-mapping benchmark derived from E. coli reactions.
    benchmark_role: Compare mapper outputs with curated biochemical reference mappings.
    license: CC BY 4.0
    citations: [beier2026computing]
    targets: [ground_truth]
    row_identifier: r_id
    row_identifier_unique: true

  aam/enzyme_map.csv.gz:
    title: EnzymeMap atom mapping
    description: Enzymatic atom-mapping benchmark from the EnzymeMap reaction collection.
    benchmark_role: Evaluate atom mapping at scale on enzymatic reactions.
    license: CC BY 4.0
    citations: [heid2023enzymemap]
    targets: [ground_truth]
    row_identifier: r_id
    row_identifier_unique: true

