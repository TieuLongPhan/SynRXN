name: Release integrity

on:
  push:
    branches: [main, data]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -e ".[query]"

      - name: Verify committed release artifacts
        run: python -m synrxn.verify_manifest --manifest manifest.json --root Data

      - name: Validate catalog, schemas, identifiers, and splits
        run: >-
          python -m synrxn.validate_data
          --data-dir Data
          --metadata Data/metadata.yaml
          --manifest manifest.json
          --json-output release-validation.json

      - name: Exercise manifest generation from scratch
        run: >-
          python -m synrxn.build_manifest
          --data-dir Data
          --manifest-output /tmp/synrxn-manifest.json
          --citation-output /tmp/CITATION.cff
          --no-include-code-manifest

      - name: Verify regenerated manifest
        run: >-
          python -m synrxn.verify_manifest
          --manifest /tmp/synrxn-manifest.json
          --root Data

      - name: Build and verify derived Parquet release
        run: |
          synrxn parquet build --data-dir Data --output-dir /tmp/synrxn-parquet
          synrxn parquet verify --data-dir Data --parquet-dir /tmp/synrxn-parquet

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation
          path: release-validation.json
          if-no-files-found: ignore
